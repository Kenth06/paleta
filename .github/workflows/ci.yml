name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript (${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm test

  rust:
    name: Rust WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/paleta-core/target
          key: cargo-${{ runner.os }}-${{ hashFiles('crates/paleta-core/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-
      - name: Build WASM
        working-directory: crates/paleta-core
        run: RUSTFLAGS='-C target-feature=+simd128' cargo build --release --target wasm32-unknown-unknown
      - name: Report WASM size
        run: |
          size=$(wc -c < crates/paleta-core/target/wasm32-unknown-unknown/release/paleta_core.wasm)
          echo "WASM size: $size bytes"
          if [ "$size" -gt 65536 ]; then
            echo "::warning::WASM artifact exceeds 64KB soft budget ($size bytes)"
          fi

  bench-summary:
    name: Bench summary (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Run JS-only bench
        run: pnpm exec vitest bench --run bench/quantize.bench.ts | tail -40
